<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monora mark: a rising sun over the horizon. Self-contained cream tile so it reads on any tab background. -->
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4A24C"/>
      <stop offset="1" stop-color="#E2613E"/>
    </linearGradient>
    <clipPath id="horizon-cut">
      <rect x="0" y="0" width="100" height="59"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="22" fill="#FBF7F0"/>
  <g stroke="#E2613E" stroke-width="5" stroke-linecap="round">
    <line x1="50" y1="15" x2="50" y2="26"/>
    <line x1="28" y1="22" x2="34" y2="30"/>
    <line x1="72" y1="22" x2="66" y2="30"/>
  </g>
  <circle cx="50" cy="59" r="25" fill="url(#sun)" clip-path="url(#horizon-cut)"/>
  <line x1="18" y1="59" x2="82" y2="59" stroke="#1E1B17" stroke-width="5.5" stroke-linecap="round"/>
</svg>
