name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected to happen, and what happened instead.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Monora?
      options:
        - Self-hosted (docker compose)
        - Self-hosted (other)
        - Local dev
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, release, or commit SHA.
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The smallest set of steps that triggers the bug.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
